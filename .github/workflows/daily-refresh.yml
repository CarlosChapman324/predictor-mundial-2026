name: Recalculo diario

# Rehace el pipeline completo cada dia, refresca el snapshot versionado y lo
# commitea. Streamlit Community Cloud detecta el commit y redespliega solo.
# Las claves van en los secrets del repo (Settings -> Secrets and variables ->
# Actions): THE_ODDS_API_KEY y APISPORTS_KEY. Nunca se escriben en el codigo.

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC todos los dias
  workflow_dispatch: {}     # tambien se puede lanzar a mano

permissions:
  contents: write           # para commitear el snapshot actualizado

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Instalar dependencias
        run: uv sync

      # Nucleo: descarga resultados nuevos, reajusta el modelo, re-simula y
      # guarda la foto del historico con timestamp.
      - name: Recalculo del nucleo + historico
        run: uv run python -m scripts.refresh

      - name: Backtesting (validacion)
        run: uv run python -m scripts.build_validation

      - name: Predicho vs real (fase de grupos)
        run: uv run python -m scripts.build_predicted_vs_actual

      # Las fases que dependen de APIs externas no deben tumbar el job si una
      # cuota se agota: continue-on-error mantiene lo que si se actualizo.
      - name: Modelo vs mercado (cuotas)
        continue-on-error: true
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: uv run python -m scripts.build_market

      - name: Goleadores (Capa 2)
        continue-on-error: true
        run: uv run python -m scripts.build_scorers

      - name: Datos de Capa 2 (API-Football) y props
        continue-on-error: true
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: |
          uv run python -m scripts.build_capa2_data --budget 50
          uv run python -m scripts.build_props

      - name: Analisis de valor
        continue-on-error: true
        run: uv run python -m scripts.build_value

      - name: Congelar snapshot para el deploy
        run: uv run python -m scripts.freeze_snapshot

      - name: Commitear el snapshot actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot
          if git diff --cached --quiet; then
            echo "Sin cambios en el snapshot; nada que commitear."
          else
            git commit -m "Recalculo diario: actualiza snapshot"
            git push
          fi
